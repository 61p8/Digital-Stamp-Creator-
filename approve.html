<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Approve Stamp Builder</title>
  <style>
    :root { --bg:#f5f0e4; --paper:#fffdf8; --line:#be6b76; --ink:#7a3c44; }
    *{box-sizing:border-box} body{margin:0;font-family:Sarabun,sans-serif;background:var(--bg);color:#222}
    .wrap{max-width:1180px;margin:0 auto;padding:20px;display:grid;grid-template-columns:420px 1fr;gap:18px}
    .card{background:var(--paper);border:1px solid #ddd;padding:16px;border-radius:8px}
    label{display:block;font-size:13px;font-weight:700;margin:10px 0 6px}
    input,select{width:100%;padding:9px;border:1px solid #ccc;border-radius:6px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{margin-top:8px;padding:10px 12px;border:1px solid #999;border-radius:6px;background:white;cursor:pointer}
    canvas{width:100%;height:auto;background:#fff;border:1px solid #ddd}
    .slot-actions{display:grid;grid-template-columns:1fr 1fr;gap:6px}
    .tiny{font-size:12px;color:#666}
    .wrap{max-width:1100px;margin:0 auto;padding:20px;display:grid;grid-template-columns:1fr 1fr;gap:18px}
    .card{background:var(--paper);border:1px solid #ddd;padding:16px;border-radius:8px}
    label{display:block;font-size:13px;font-weight:700;margin:10px 0 6px}
    input{width:100%;padding:9px;border:1px solid #ccc;border-radius:6px}
    .row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    button{margin-top:12px;padding:10px 12px;border:1px solid #999;border-radius:6px;background:white;cursor:pointer}
    canvas{width:100%;height:auto;background:#fff;border:1px solid #ddd}
    @media(max-width:900px){.wrap{grid-template-columns:1fr}}
  </style>
</head>
<body>
<div class="wrap">
  <section class="card">
    <h2>Approve Stamp</h2>
    <label>Header</label><input id="header" value="ABOLISHED" />
    <label>Reason</label><input id="reason" value="Reason" />
    <label>Date</label><input id="date" value="Date .......... / .......... / .........." />
    <label>Color</label><input id="ink" type="color" value="#be6b76" />
    <label>Border Scale</label><input id="borderScale" type="range" min="0.8" max="1.4" step="0.05" value="1" />

    <hr>
    <h3>3 Signatures</h3>
    <label>Approved</label>
    <div class="slot-actions">
      <button onclick="openSign('approved')">ไปทำ Sign</button>
      <input id="scale-approved" type="range" min="0.4" max="1.6" step="0.05" value="1" />
    </div>
    <label>Checked</label>
    <div class="slot-actions">
      <button onclick="openSign('checked')">ไปทำ Sign</button>
      <input id="scale-checked" type="range" min="0.4" max="1.6" step="0.05" value="1" />
    </div>
    <label>Writer</label>
    <div class="slot-actions">
      <button onclick="openSign('writer')">ไปทำ Sign</button>
      <input id="scale-writer" type="range" min="0.4" max="1.6" step="0.05" value="1" />
    </div>
    <p class="tiny">ลากลายเซ็นบนภาพได้ (drag & drop) เพื่อจัดตำแหน่ง</p>

    <button onclick="downloadPNG()">Download PNG</button>
    <button onclick="location.href='index.html'">Back Home</button>
  </section>
  <section class="card"><canvas id="c" width="1000" height="700"></canvas></section>
</div>
<script>
const ids=['header','reason','date','ink','borderScale','scale-approved','scale-checked','scale-writer'];
ids.forEach(id=>document.getElementById(id).addEventListener('input',render));
const slots={approved:{x:0,y:0,s:1,img:null},checked:{x:0,y:0,s:1,img:null},writer:{x:0,y:0,s:1,img:null}};
let drag=null;

function openSign(slot){ location.href=`sign.html?mode=picker&slot=${slot}`; }
function restoreSigns(){
 ['approved','checked','writer'].forEach(k=>{ const d=localStorage.getItem('approve.sign.'+k); if(d){const img=new Image();img.onload=()=>render();img.src=d;slots[k].img=img;localStorage.removeItem('approve.sign.'+k);} });
}

function render(){
  const cv=document.getElementById('c'),ctx=cv.getContext('2d');
  const W=cv.width,H=cv.height,ink=document.getElementById('ink').value,bs=parseFloat(document.getElementById('borderScale').value);
  ctx.clearRect(0,0,W,H); ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); ctx.strokeStyle=ink; ctx.fillStyle=ink; ctx.lineWidth=5*bs;
  const x=80,y=70,w=840,h=540; ctx.strokeRect(x,y,w,h);
  ctx.font=`700 ${Math.floor(78*bs)}px sans-serif`; ctx.textAlign='left'; ctx.textBaseline='top'; ctx.fillText(document.getElementById('header').value,x+28,y+24);
  ctx.font=`600 ${Math.floor(50*bs)}px sans-serif`; ctx.fillText(document.getElementById('reason').value,x+28,y+150); ctx.beginPath();ctx.moveTo(x+210,y+198);ctx.lineTo(x+w-28,y+198);ctx.stroke(); ctx.beginPath();ctx.moveTo(x+28,y+262);ctx.lineTo(x+w-28,y+262);ctx.stroke();
  ctx.font=`600 ${Math.floor(46*bs)}px sans-serif`; ctx.fillText(document.getElementById('date').value,x+28,y+286); ctx.beginPath();ctx.moveTo(x+28,y+342);ctx.lineTo(x+w-28,y+342);ctx.stroke();
  const footerTop=y+342,secW=w/3,bh=h-(footerTop-y); ctx.beginPath();ctx.moveTo(x+secW,footerTop);ctx.lineTo(x+secW,y+h);ctx.stroke(); ctx.beginPath();ctx.moveTo(x+2*secW,footerTop);ctx.lineTo(x+2*secW,y+h);ctx.stroke();
  ['approved','checked','writer'].forEach((k,i)=>{ const sx=parseFloat(document.getElementById('scale-'+k).value); slots[k].s=sx; const bx=x+i*secW+18,by=footerTop+18,bw=secW-36,bh2=bh-72; if(slots[k].x===0&&slots[k].y===0){slots[k].x=bx;slots[k].y=by;} if(slots[k].img){const iw=bw*sx,ih=bh2*sx; ctx.drawImage(slots[k].img,slots[k].x,slots[k].y,iw,ih);} else {ctx.strokeRect(bx,by,bw,bh2); ctx.font='500 24px sans-serif';ctx.fillText('คลิก ไปทำ Sign',bx+18,by+30);} });
  ctx.font='700 42px sans-serif'; ctx.fillText('Approved',x+16,y+h-48); ctx.fillText('Checked',x+secW+16,y+h-48); ctx.fillText('Writer',x+2*secW+16,y+h-48);
}
function hit(mx,my){ for(const [i,k] of ['approved','checked','writer'].entries()){const x0=slots[k].x,y0=slots[k].y,secW=840/3,bw=(secW-36)*slots[k].s,bh=(198-72)*slots[k].s; if(mx>=x0&&mx<=x0+bw&&my>=y0&&my<=y0+bh) return k;} return null; }
const cv=document.getElementById('c');
cv.addEventListener('mousedown',e=>{const r=cv.getBoundingClientRect(),mx=(e.clientX-r.left)*(cv.width/r.width),my=(e.clientY-r.top)*(cv.height/r.height); const k=hit(mx,my); if(k) drag={k,dx:mx-slots[k].x,dy:my-slots[k].y};});
window.addEventListener('mouseup',()=>drag=null);
window.addEventListener('mousemove',e=>{if(!drag)return;const r=cv.getBoundingClientRect(),mx=(e.clientX-r.left)*(cv.width/r.width),my=(e.clientY-r.top)*(cv.height/r.height); slots[drag.k].x=mx-drag.dx; slots[drag.k].y=my-drag.dy; render();});
function downloadPNG(){ render(); const a=document.createElement('a'); a.download='approve-stamp.png'; a.href=cv.toDataURL('image/png'); a.click(); }
restoreSigns(); render();
</script>
</body></html>
  <div class="wrap">
    <section class="card">
      <h2>Approve Stamp</h2>
      <label>Header</label><input id="header" value="ABOLISHED" />
      <label>Reason</label><input id="reason" value="Reason" />
      <label>Date</label><input id="date" value="Date .......... / .......... / .........." />
      <div class="row">
        <div><label>Approved Sign</label><input id="approved" value="Approved" /></div>
        <div><label>Checked Sign</label><input id="checked" value="Checked" /></div>
      </div>
      <label>Writer Sign</label><input id="writer" value="Writer" />
      <button onclick="downloadPNG()">Download PNG</button>
      <button onclick="location.href='index.html'">Back Home</button>
    </section>

    <section class="card">
      <canvas id="c" width="1000" height="700"></canvas>
    </section>
  </div>
<script>
  const ids=['header','reason','date','approved','checked','writer'];
  ids.forEach(id=>document.getElementById(id).addEventListener('input',render));

  function drawSign(ctx,text,x,y,w,h){
    ctx.save();
    ctx.strokeStyle='#be6b76';
    ctx.fillStyle='#be6b76';
    const r=Math.min(w,h)*0.35;
    ctx.lineWidth=3;
    ctx.beginPath();ctx.arc(x+w/2,y+h/2,r,0,Math.PI*2);ctx.stroke();
    ctx.font=`700 ${Math.floor(h*0.22)}px sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(text,x+w/2,y+h/2);
    ctx.restore();
  }

  function render(){
    const cv=document.getElementById('c'),ctx=cv.getContext('2d');
    const W=cv.width,H=cv.height;
    ctx.clearRect(0,0,W,H);
    ctx.fillStyle='#fff';ctx.fillRect(0,0,W,H);
    ctx.strokeStyle='#be6b76';ctx.fillStyle='#be6b76';
    ctx.lineWidth=5;
    const x=80,y=70,w=840,h=540;
    ctx.strokeRect(x,y,w,h);

    ctx.font='700 78px sans-serif';ctx.textAlign='left';ctx.textBaseline='top';
    ctx.fillText(document.getElementById('header').value,x+28,y+24);

    ctx.font='600 50px sans-serif';
    ctx.fillText(document.getElementById('reason').value,x+28,y+150);
    ctx.beginPath();ctx.moveTo(x+210,y+198);ctx.lineTo(x+w-28,y+198);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+28,y+262);ctx.lineTo(x+w-28,y+262);ctx.stroke();

    ctx.font='600 46px sans-serif';
    ctx.fillText(document.getElementById('date').value,x+28,y+286);
    ctx.beginPath();ctx.moveTo(x+28,y+342);ctx.lineTo(x+w-28,y+342);ctx.stroke();

    const footerTop=y+342, secW=w/3;
    ctx.beginPath();ctx.moveTo(x+secW,footerTop);ctx.lineTo(x+secW,y+h);ctx.stroke();
    ctx.beginPath();ctx.moveTo(x+2*secW,footerTop);ctx.lineTo(x+2*secW,y+h);ctx.stroke();

    const bh=h-(footerTop-y);
    drawSign(ctx,document.getElementById('approved').value,x+0*secW+18,footerTop+18,secW-36,bh-72);
    drawSign(ctx,document.getElementById('checked').value,x+1*secW+18,footerTop+18,secW-36,bh-72);
    drawSign(ctx,document.getElementById('writer').value,x+2*secW+18,footerTop+18,secW-36,bh-72);

    ctx.font='700 42px sans-serif';
    ctx.fillText('Approved',x+16,y+h-48);
    ctx.fillText('Checked',x+secW+16,y+h-48);
    ctx.fillText('Writer',x+2*secW+16,y+h-48);
  }

  function downloadPNG(){
    render();
    const a=document.createElement('a');
    a.download='approve-stamp.png';
    a.href=document.getElementById('c').toDataURL('image/png');
    a.click();
  }
  render();
</script>
</body>
</html>
