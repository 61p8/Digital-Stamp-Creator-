<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Digital Stamp Creator · Home</title>
  <style>
    :root {
      --bg: #f5f0e4;
      --paper: #fbf7ec;
      --card: #fefcf5;
      --ink: #1a1612;
      --ink-2: #4a423a;
      --ink-3: #8a8075;
      --line: #d9d1bf;
      --stamp: #b4383a;
      --stamp-dark: #8b2a2c;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      font-family: 'Sarabun', system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: var(--bg);
      color: var(--ink);
      padding: 28px;
    }
    .app { max-width: 1100px; margin: 0 auto; }
    header { margin-bottom: 24px; }
    h1 { font-size: 30px; margin-bottom: 6px; }
    .sub { color: var(--ink-3); }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 14px;
    }
    .tile {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 16px;
      text-decoration: none;
      color: inherit;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 150px;
      transition: transform .12s ease, border-color .12s ease, box-shadow .12s ease;
    }
    .tile:hover {
      transform: translateY(-2px);
      border-color: var(--ink-2);
      box-shadow: 0 6px 16px rgba(0,0,0,.08);
    }
    .emoji { font-size: 36px; }
    .title { font-size: 20px; font-weight: 700; }
    .desc { color: var(--ink-2); line-height: 1.4; }
    .tag {
      display: inline-block;
      font-size: 12px;
      border-radius: 999px;
      padding: 3px 8px;
      width: fit-content;
      margin-top: auto;
      border: 1px solid var(--line);
      color: var(--ink-2);
      background: var(--paper);
    }
    .tag.active { background: rgba(180,56,58,.08); color: var(--stamp-dark); border-color: var(--stamp); }
  </style>
</head>
<body>
  <div class="app">
    <header>
      <h1>Stamp Suite</h1>
      <p class="sub">หน้ารวมฟีเจอร์ (เหมือนหน้าแอปบนมือถือ) — เลือกโมดูลที่ต้องการใช้งาน</p>
    </header>

    <section class="grid">
      <a class="tile" href="sign.html">
        <div class="emoji">✍️</div>
        <div class="title">Sign Stamp</div>
        <div class="desc">ฟีเจอร์เดิมสำหรับสร้างตราประทับลายเซ็น/ชื่อ พร้อม export PNG/SVG</div>
        <span class="tag active">Available now</span>
      </a>

      <a class="tile" href="approve.html">
        <div class="emoji">✅</div>
        <div class="title">Approve Stamp</div>
        <div class="desc">ฟีเจอร์ใหม่ที่คุณกำลังจะเพิ่มสำหรับสร้างตราเพื่อการอนุมัติเอกสาร</div>
        <span class="tag active">Available now</span>
      </a>
    </section>
  </div>
</body>
</html>
